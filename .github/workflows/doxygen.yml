name: doxygen documentation build and publish
on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      RUNNER_LABEL:
        description: 'Match Runner Label'
        required: false
        type: string

# cancel previous job if new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doxygen:
    if: ${{ github.repository_owner == 'mantidproject' }}
    runs-on:
      - ${{ (inputs.RUNNER_LABEL == '' && 'self-hosted') || inputs.RUNNER_LABEL }}
      - self-hosted
      - Linux
      - X64
    #
    # If the user who clicked "Run Workflow" button left the RUNNER_LABEL field blank,
    # the default evaluated output is the string 'self-hosted'.
    # Otherwise set it to the value the user specified when they clicked "Run Workflow"
    #

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            doxygen:
              - '**/*.cpp'
              - '**/*.h'
              - '**/*.hxx'
              - 'Framework/Doxygen/**'
              - 'conda/recipes/mantid-developer/**'
              - 'conda/recipes/conda_build_config.yaml'
              - '.github/actions/doxygen-build/**'
              - '.github/workflows/doxygen.yml'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.4
        if: steps.changes.outputs.doxygen == 'true'
        with:
          frozen: true

      - uses: ./.github/actions/doxygen-build
        name: build doxygen
        if: steps.changes.outputs.doxygen == 'true'

      # publish documentation if on main branch of mantidproject/mantid
      - name: Checkout Doxygen repository
        if: ${{ steps.changes.outputs.doxygen == 'true' }}
        env:
          DOXYGEN_REPO_TOKEN: ${{ secrets.DOXYGEN_REPO_TOKEN }}
        run: |
          git clone https://$DOXYGEN_REPO_TOKEN@github.com/mantidproject/doxygen.git doxygen_repo
          rm -rf doxygen_repo/*

      - name: Copy Doxygen artifacts
        if: ${{ steps.changes.outputs.doxygen == 'true' }}
        run: |
          cp -r $GITHUB_WORKSPACE/build/doxygen/html/* doxygen_repo/

      - name: Commit Doxygen and push
        if: ${{ steps.changes.outputs.doxygen == 'true' }}
        working-directory: doxygen_repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update Doxygen docs"
          git push origin main
